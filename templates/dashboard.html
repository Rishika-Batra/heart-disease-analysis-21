{% extends "base.html" %}
{% block content %}

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: 'Outfit', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #333;
    min-height: 100vh;
}

/* Container */
.dashboard-container{
    padding: 40px 20px;
    max-width: 1200px;
    margin: 0 auto;
}

/* Page Title */
.page-title{
    text-align: center;
    font-size: 48px;
    font-weight: 800;
    margin-bottom: 60px;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    letter-spacing: -1px;
}

/* Tabs */
.tabs{
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
    margin-bottom: 50px;
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
}

.tab-btn{
    padding: 14px 32px;
    border-radius: 12px;
    border: 2px solid transparent;
    cursor: pointer;
    font-weight: 600;
    background: rgba(255,255,255,0.2);
    color: white;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.tab-btn:hover{
    background: rgba(255,255,255,0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.15);
}

.tab-btn.active{
    background: white;
    color: #667eea;
    box-shadow: 0 12px 24px rgba(0,0,0,0.2);
    border-color: white;
}

/* Dashboard Glass Box */
.dash{
    display: none;
    animation: slideUp 0.5s ease;
}

.active-dash{
    display: block;
}

iframe{
    width: 100%;
    height: 850px;
    border-radius: 16px;
    border: none;
    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    background: white;
}

/* Animation */
@keyframes slideUp{
    from{
        opacity: 0;
        transform: translateY(30px);
    }
    to{
        opacity: 1;
        transform: translateY(0);
    }
}

/* Responsive */
@media(max-width:768px){
    .dashboard-container {
        padding: 30px 15px;
    }
    
    .page-title{
        font-size: 32px;
        margin-bottom: 40px;
    }
    
    .tabs {
        gap: 10px;
        padding: 15px;
    }
    
    .tab-btn {
        padding: 10px 20px;
        font-size: 13px;
    }
    
    iframe{
        height: 600px;
    }
}
</style>

<div class="dashboard-container">

    <h2 class="page-title">Interactive Heart Disease Dashboards</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="showDash('d1', this)">Demographic Analysis</button>
        <button class="tab-btn" onclick="showDash('d2', this)">Lifestyle Factors</button>
        <button class="tab-btn" onclick="showDash('d3', this)">Medical Conditions</button>
    </div>

    <!-- Demographic -->
    <div id="d1" class="dash active-dash">
        <iframe 
        src="https://public.tableau.com/views/heartdiseaseg/Demographicanalysis?:embed=yes&:showVizHome=no">
        </iframe>
    </div>

    <!-- Lifestyle -->
    <div id="d2" class="dash">
        <iframe 
        src="https://public.tableau.com/views/heartdiseasegro/LifestyleRiskFactors?:embed=yes&:showVizHome=no">
        </iframe>
    </div>

    <!-- Medical -->
    <div id="d3" class="dash">
        <iframe 
        src="https://public.tableau.com/views/heartdiseasegr/MedicalConditionsAnalysis?:embed=yes&:showVizHome=no">
        </iframe>
    </div>

</div>

<script>
function showDash(id, btn) {
    document.querySelectorAll('.dash').forEach(d => d.classList.remove('active-dash'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

    document.getElementById(id).classList.add('active-dash');
    btn.classList.add('active');
}
</script>

{% endblock %}
